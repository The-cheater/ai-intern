version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: neurosync-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside Docker, Ollama is reachable at the ollama service hostname
      OLLAMA_URL: http://ollama:11434
    volumes:
      # Persist calibration and output files across restarts
      - ./outputs:/app/outputs
      # Mount service-account key as read-only
      - ./ai-intern-489710-129aed4e17ac.json:/app/ai-intern-489710-129aed4e17ac.json:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama LLM server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: neurosync-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  ollama_data:
